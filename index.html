<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Greenwich - Barkada Pizza & Pasta</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  
  <div id="imageModal" class="modal" onclick="closeModal()">
    <span class="close">&times;</span>
    <img class="modal-content" id="imgFull">
    <div id="caption"></div>
</div>

  <body>
    <header>
      <img src="GreenwichLogo.jpg" alt="Greenwich Logo" class="logo" />
      <h1>Greenwich Pizza & Pasta</h1>
      <nav>
        <a href="index.html">Pizza & Pasta</a>
        <a href="drinks.html">Drinks</a>
        <a href="dessert.html">Sides & Dessert</a>
      </nav>
    </header>

    <section class="menu">
      <h2>Pizza & Pasta</h2>

      <div class="item">
        <img src="hawaiian-overload-lifestyle.webp" class="food-img" onclick="openModal(this)"/>
        <span>Hawaiian Overload (₱399)</span>
        <input type="number" id="pizzaQty" min="0" value="0" />
      </div>

      <div class="item">
        <img src="lasagna-supreme-solo-lift.webp" class="food-img" onclick="openModal(this)"/>
        <span>Lasagna Supreme (₱199)</span>
        <input type="number" id="lasagnaQty" min="0" value="0" />
      </div>

      <div class="item">
        <img src="creamy-carbonara-solo.webp" class="food-img" onclick="openModal(this)"/>
        <span>Creamy Carbonara (₱180)</span>
        <input type="number" id="carbonaraQty" min="0" value="0" />
      </div>

      <div class="item">
        <img src="creamy-spinach-pizzawrap-thumbnail.webp" class="food-img" onclick="openModal(this)"/>
        <span>Creamy Spinach Pizzawrap (₱120)</span>
        <input type="number" id="chickenQty" min="0" value="0" />
      </div>

<div class="age-section" style="margin-bottom: 15px; text-align: center;">
    <label for="userAge" style="font-weight: bold; color: #006838;">Enter Age for Discount Check:</label>
    <input type="number" id="userAge" placeholder="Age" min="1" style="width: 80px; padding: 5px; border: 2px solid #ffc20e; border-radius: 5px;">
    
</div>
      <button onclick="computeGreenwichOrder()">Place Order</button>
      <div id="totalMain"><h3>Total: ₱0</h3></div>
    </section>

    <script src="script.js"></script>
  </body>
</html>
